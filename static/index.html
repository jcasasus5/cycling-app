<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tacx Flux Climber</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%230f766e'/%3E%3Cpath d='M14 42h9l8-20 7 20h12' fill='none' stroke='white' stroke-width='6' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-main">
            <div class="brand-mark">TC</div>
            <div>
              <h1>Tacx Flux Climber</h1>
              <p>Training studio</p>
            </div>
          </div>
          <button class="settings-shortcut" data-view="settings" aria-label="Ajustes" title="Ajustes">⚙</button>
        </div>
        <nav aria-label="Principal">
          <button data-view="routes" class="active"><span class="nav-icon">R</span><span>Rutas</span></button>
          <button data-view="import"><span class="nav-icon">+</span><span>Crear Ruta</span></button>
          <button data-view="activities"><span class="nav-icon">A</span><span>Actividades</span></button>
        </nav>
        <div class="user-account" data-user-account hidden>
          <span>Sesión iniciada</span>
          <strong data-user-email></strong>
          <button data-action="logout">Cerrar sesión</button>
        </div>
      </aside>
      <main id="app" class="content"></main>
    </div>
    <script type="module" src="/static/app.js"></script>
  </body>
</html>
